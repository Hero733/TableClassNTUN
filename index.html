<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCNTUN - TableClassNTUN</title>
    <link href="https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="screen active flex-center login-bg">
        <div class="login-container">
            <div class="login-card glass-premium ripple-shadow">
                <div class="logo-wrapper">
                    <img src="photo/logo.png" alt="TCNTUN Logo" class="main-logo-new">
                </div>
                <h1 class="logo-text-new gradient-text-anim">TCNTUN</h1>
                <p class="subtitle-new">ระบบจองที่นั่ง TableClassNTUN</p>
                <p class="school-domain-new">เฉพาะ @ntun.ac.th</p>
                
                <button id="login-btn" class="g-btn-new">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="G" class="g-logo">
                    เข้าสู่ระบบด้วย Google
                </button>
                <p id="error-msg" class="error-text hidden"></p>
            </div>
        </div>
    </div>

    <div id="main-app" class="screen hidden main-bg-new">
        <header class="floating-header glass-premium shadow-premium">
            <div class="user-block-new">
                <img src="photo/logo.png" alt="Logo" class="nav-logo-new">
                <div>
                    <h2 id="user-name">ชื่อนักเรียน</h2>
                    <p id="user-email" class="email-text-new">email@ntun.ac.th</p>
                </div>
            </div>
            <button id="logout-btn" class="ios-btn-new danger rounded">ออกระบบ</button>
        </header>

        <main id="student-view" class="view-area active">
            <div id="join-section" class="flex-center col p-top-new">
                <div class="qr-glow-btn glass ripple-shadow" onclick="showSeatMap()">
                    <div class="qr-icon-new flex-center gradient-text-anim">📷</div>
                    <p class="qr-text">สแกน QR เข้าห้อง</p>
                    <div class="rainbow-glow"></div>
                </div>
            </div>

            <div id="seat-map-section" class="hidden">
                <div class="class-title-card glassshadow-premium">
                    <h2 class="card-title-new">ชั้นเรียน ม.5/1</h2>
                    <p class="card-subtitle-new">TableClassNTUN System</p>
                </div>
                
                <div class="teacher-board-premium glass shadow-premium">
                    <span>📺 โต๊ะครู & กระดาน</span>
                    <div class="board-light"></div>
                </div>

                <div id="classroom-grid" class="seat-grid-premium">
                    </div>
            </div>
        </main>

        <main id="teacher-view" class="view-area hidden flex-center col p-top-new">
            <div class="teacher-management-card glass shadow-premium text-center">
                <h2 class="card-title-new gradient-text-anim">Teacher Management</h2>
                <p>สร้าง QR Code สำหรับชั้นเรียน</p>
                <div class="mock-qr-premium gradient-border-anim">QR</div>
                <button class="ios-btn-new primary rounded full-wshadow-premium">ดูผังที่นั่งปัจจุบัน</button>
            </div>
        </main>

        <nav id="bottom-nav" class="floating-nav glass shadow-premium">
            <button class="nav-item-new active">
                <span class="nav-icon">🏠</span><span>หน้าหลัก</span>
            </button>
            <button class="nav-item-new center-action-new">
                <span class="nav-icon">📷</span>
            </button>
            <button class="nav-item-new">
                <span class="nav-icon">⚙️</span><span>ตั้งค่า</span>
            </button>
        </nav>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden flex-center modal-anim">
        <div class="modal-card-premium glass-deep shadow-premium">
            <div class="modal-header"></div>
            <h3>ยืนยันการจองที่นั่ง</h3>
            <p>คุณต้องการจองที่นั่ง <strong id="modal-seat-id" class="gradient-text-anim"></strong> ใช่หรือไม่?</p>
            <div class="modal-actions-premium">
                <button id="cancel-book-btn" class="ios-modal-btn-new secondary rounded">ยกเลิก</button>
                <button id="confirm-book-btn" class="ios-modal-btn-new primary rounded shadow-premium">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
